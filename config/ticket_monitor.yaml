project: STL
poll_interval_minutes: 5

validation_rules:
  Bug:
    required:
      - affectedVersion
      - components
      - priority
      - description
    warn:
      - assignee
      - labels
  Story:
    required:
      - components
      - fixVersions
    warn:
      - assignee
  Epic:
    required:
      - description
      - fixVersions
    warn:
      - components
  Sub-task:
    required: []
    warn: []

learning:
  enabled: true
  min_observations: 20
  confidence_thresholds:
    auto_fill: 0.90
    suggest: 0.50
    flag_only: 0.00
  feedback_detection: true
  keyword_extraction: true
  reporter_profiling: true
  valid_affects_versions:
    - "10.14.4.x"
    - "10.14.2.x"
    - "10.14.1.Update"
    - "10.14.0.0"
    - "10.13.0.0"
    - "10.12.1.0"
    - "10.12.0.0"
    - "10.11.1.3"
    - "10.11.1.2"
    - "10.11.1.1"
    - "10.11.1.0"
    - "10.11.0.1"
    - "10.10.3.1"
    - "10.9.0.1"
    - "10.9.0.0"
    - "10.8.2.1"
    - "10.8.2.0"
    - "10.8.0.2"
    - "10.8.0.1"
    - "10.8.0.0"
    - "10.7.0.0"
    - "10.6.0.0"
    - "10.5.0.0"
    - "1.12.0.0"
    - "1.11.0.0"
    - "1.10.0.0"
    - "12.0.0.x"
    - "12.0.1.x"
    - "12.0.2.x"
    - "12.0.3.x"
    - "12.1.0.x"
    - "12.1.0.1"
    - "12.1.0.2.x"
    - "12.1.1.x"
    - "12.1.2.x"
    - "12.2.0.x"
    - "12.3.0.x"

notifications:
  jira_comment: true
  mention_reporter: true
  slack_webhook: null
